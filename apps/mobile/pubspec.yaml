name: onesign_console
description: OneSign client console — manage screens and content from iOS/Android.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.2.1
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  shared_preferences: ^2.5.3
  supabase_flutter: ^2.9.0
  http: ^1.6.0
  intl: ^0.20.3
  file_picker: ^11.0.2
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.2
  google_sign_in: ^7.2.0
  flutter_svg: ^2.3.0
  app_links: ^7.2.1
  webview_flutter: ^4.14.1
  webview_flutter_android: ^4.13.0
  webview_flutter_wkwebview: ^3.26.0
  webview_flutter_platform_interface: ^2.15.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/onesign_tv_lockup.svg
    - assets/images/onesign_mark.svg
    - assets/images/google_g.svg
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.otf
          weight: 400
        - asset: assets/fonts/Inter-Medium.otf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Inter-Bold.otf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.otf
          weight: 800
